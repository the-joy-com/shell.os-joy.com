<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="dark" />
    <!-- Tab/bookmark icon (the green-J mark), reusing the same source as the PWA icons.
         .ico carries 16/32/48 for desktop; the 32 PNG is preferred where supported; apple-touch-icon is iOS's home-screen/Safari icon. -->
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <!-- PWA: manifest enables install (name, icon, standalone). No theme-color since standalone has no browser chrome. -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>the joy — shell</title>
  </head>
  <body>
    <div id="terminal"></div>
    <!-- Running version, pinned to the bottom-right corner over the terminal. Filled in by main.ts from the build-time version. -->
    <div id="version"></div>
    <!-- Connectivity dot, pinned to the bottom-left corner. main.ts colours it green online, red offline. -->
    <div id="connection"></div>
    <!-- The Joy's three repos, pinned bottom-center. Static links (unlike the version/connection
         furniture these are real targets), each opening one repo on GitHub in a new tab. -->
    <div id="source">source: <a href="https://github.com/the-joy-com/shell.os-joy.com" target="_blank" rel="noopener">shell</a> · <a href="https://github.com/the-joy-com/kernel.os-joy.com" target="_blank" rel="noopener">kernel</a> · <a href="https://github.com/the-joy-com/build.os-joy.com" target="_blank" rel="noopener">build</a></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
